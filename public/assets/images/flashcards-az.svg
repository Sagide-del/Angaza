      <rect x="70" y="150" width="180" height="200" rx="18" fill="#fff" stroke="#12A5A0" stroke-width="4"/>
      <text x="160" y="240" text-anchor="middle" font-size="70" fill="#F4A623">A</text>
      <text x="160" y="310" text-anchor="middle" font-size="24" fill="#1E2A44">Ant</text>
