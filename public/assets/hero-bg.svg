<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 520" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="sunGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FFE18C"/>
      <stop offset="55%" stop-color="#F6C945"/>
      <stop offset="100%" stop-color="#EFB929"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F6C945" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F6C945" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow behind the sun -->
  <circle cx="330" cy="230" r="220" fill="url(#sunGlow)"/>

  <!-- rising sun -->
  <circle cx="330" cy="230" r="150" fill="url(#sunGrad)"/>

  <!-- sun rays, graduated lengths for rhythm -->
  <g stroke="#F6C945" stroke-linecap="round" opacity="0.8">
    <line x1="330" y1="58" x2="330" y2="18" stroke-width="7"/>
    <line x1="226" y1="86" x2="204" y2="58" stroke-width="6"/>
    <line x1="434" y1="86" x2="456" y2="58" stroke-width="6"/>
    <line x1="156" y1="152" x2="122" y2="132" stroke-width="6"/>
    <line x1="504" y1="152" x2="538" y2="132" stroke-width="6"/>
    <line x1="136" y1="230" x2="98" y2="230" stroke-width="7"/>
    <line x1="524" y1="230" x2="562" y2="230" stroke-width="7"/>
  </g>
  <circle cx="330" cy="18" r="3" fill="#F6C945" opacity="0.8"/>
  <circle cx="98" cy="230" r="3" fill="#F6C945" opacity="0.8"/>
  <circle cx="562" cy="230" r="3" fill="#F6C945" opacity="0.8"/>

  <!-- decorative: lightbulb top-left -->
  <g transform="translate(30,44)" stroke="#B9C1CE" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <circle cx="18" cy="16" r="13"/>
    <path d="M12.5 29h11M14.5 33h7"/>
    <path d="M18 3v-6M4 16h-6M40 16h6M7.5 5l-4.2-4.2M28.5 5l4.2-4.2"/>
  </g>

  <!-- decorative: cloud bottom-right, single smooth path -->
  <path d="M462 420
           a16 16 0 0 1 15-16
           a20 20 0 0 1 39-6
           a14 14 0 0 1 4 27.5
           h-42
           a16 16 0 0 1 -16-5.5 Z"
        fill="#E9EDF3" opacity="0.95"/>

  <!-- decorative: sparkle top-right -->
  <path d="M512 30 q4 14 18 18 q-14 4 -18 18 q-4 -14 -18 -18 q14 -4 18 -18 Z" fill="#D7DEE9" opacity="0.9"/>

  <!-- decorative: small sparkle near pencils -->
  <path d="M64 424 q2.4 8 10.4 10.4 q-8 2.4 -10.4 10.4 q-2.4 -8 -10.4 -10.4 q8 -2.4 10.4 -10.4 Z" fill="#F6C945" opacity="0.65"/>

  <!-- pencil cup -->
  <g>
    <rect x="144" y="334" width="38" height="42" rx="7" fill="#fff" stroke="#17324D" stroke-width="3"/>
    <rect x="144" y="334" width="38" height="10" rx="5" fill="#F1F3F7"/>
    <line x1="154" y1="336" x2="150" y2="298" stroke="#F6C945" stroke-width="6" stroke-linecap="round"/>
    <line x1="164" y1="336" x2="170" y2="294" stroke="#2FAE66" stroke-width="6" stroke-linecap="round"/>
    <line x1="175" y1="336" x2="184" y2="300" stroke="#E0784A" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- stacked books bottom-right -->
  <g>
    <rect x="380" y="362" width="74" height="19" rx="3.5" fill="#E0A800"/>
    <rect x="386" y="343" width="62" height="19" rx="3.5" fill="#2FAE66"/>
    <rect x="386" y="343" width="62" height="6" rx="3" fill="#3FC384" opacity="0.6"/>
    <rect x="380" y="362" width="74" height="6" rx="3" fill="#F0BF3E" opacity="0.6"/>
  </g>
</svg>
