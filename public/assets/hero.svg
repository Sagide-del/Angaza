<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 520" role="img" aria-label="A child learning at a desk beneath a rising sun">
  <!-- rising sun -->
  <circle cx="330" cy="230" r="150" fill="#F6C945"/>
  <g stroke="#F6C945" stroke-width="7" stroke-linecap="round" opacity="0.85">
    <line x1="330" y1="48" x2="330" y2="14"/>
    <line x1="222" y1="80" x2="200" y2="54"/>
    <line x1="438" y1="80" x2="460" y2="54"/>
    <line x1="150" y1="150" x2="118" y2="132"/>
    <line x1="510" y1="150" x2="542" y2="132"/>
    <line x1="130" y1="230" x2="94" y2="230"/>
    <line x1="530" y1="230" x2="566" y2="230"/>
  </g>

  <!-- decorative: lightbulb top-left -->
  <g transform="translate(28,46)" stroke="#C9CFDA" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <circle cx="20" cy="18" r="14"/>
    <path d="M14 32h12M16 36h8"/>
    <path d="M20 4v-6M6 18h-6M40 18h-6M9 5l-4-4M31 5l4-4"/>
  </g>

  <!-- decorative: cloud bottom-right -->
  <g transform="translate(470,412)" fill="#E7EBF1" opacity="0.9">
    <ellipse cx="20" cy="20" rx="20" ry="14"/>
    <ellipse cx="40" cy="16" rx="16" ry="12"/>
    <ellipse cx="8" cy="14" rx="12" ry="10"/>
  </g>

  <!-- decorative: sparkle top-right -->
  <g transform="translate(500,36)" fill="#D8DEE8" opacity="0.9">
    <path d="M12 0 L15 9 L24 12 L15 15 L12 24 L9 15 L0 12 L9 9 Z"/>
  </g>

  <!-- decorative: small sparkle bottom-left -->
  <g transform="translate(60,430)" fill="#F6C945" opacity="0.55">
    <path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z"/>
  </g>

  <!-- desk -->
  <rect x="150" y="380" width="280" height="14" rx="4" fill="#17324D"/>
  <rect x="170" y="394" width="14" height="80" fill="#17324D"/>
  <rect x="396" y="394" width="14" height="80" fill="#17324D"/>

  <!-- open book on desk -->
  <path d="M215 380 q50 -18 90 0 v-4 q-45 -16 -90 0 z" fill="#17324D"/>
  <path d="M305 380 q50 -18 90 0 v-4 q-45 -16 -90 0 z" fill="#1f4468"/>
  <g stroke="#F6C945" stroke-width="2.6" stroke-linecap="round" opacity="0.9">
    <line x1="230" y1="368" x2="282" y2="362"/>
    <line x1="318" y1="362" x2="370" y2="368"/>
  </g>

  <!-- pencil cup -->
  <rect x="146" y="336" width="36" height="40" rx="6" fill="#fff" stroke="#17324D" stroke-width="3"/>
  <line x1="156" y1="336" x2="152" y2="300" stroke="#F6C945" stroke-width="6" stroke-linecap="round"/>
  <line x1="166" y1="336" x2="172" y2="296" stroke="#2FAE66" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="336" x2="184" y2="302" stroke="#E0A800" stroke-width="6" stroke-linecap="round"/>

  <!-- stacked books bottom-right -->
  <rect x="382" y="360" width="70" height="18" rx="3" fill="#F4A623"/>
  <rect x="388" y="342" width="60" height="18" rx="3" fill="#2FAE66"/>

  <!-- child -->
  <g>
    <circle cx="290" cy="288" r="48" fill="#8a5a3c"/>
    <path d="M244 272 a46 46 0 0 1 92 0 q-16 -28 -46 -28 t-46 28 Z" fill="#2b1a10"/>
    <circle cx="274" cy="290" r="4" fill="#17212B"/>
    <circle cx="306" cy="290" r="4" fill="#17212B"/>
    <path d="M276 306 q14 9 28 0" fill="none" stroke="#17212B" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M240 380 q50 -46 100 0 Z" fill="#17324D"/>
    <path d="M250 346 q40 -30 80 0 l7 34 h-94 Z" fill="#F6C945"/>
  </g>
</svg>
